name: Scrape MBA Notices (10 min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Run Scraper (Notices Mode)
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPER_ANT_KEY: ${{ secrets.SCRAPER_ANT_KEY }}
          WEBSCRAPING_AI_KEY: ${{ secrets.WEBSCRAPING_AI_KEY }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scraper.py --mode notices
      - name: Commit Sync Memory
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add synced_ids.json || true
          git commit -m "update sync memory [skip ci]" || true
          git push || true

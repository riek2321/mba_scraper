name: Keep-Alive Heartbeat 💓

on:
  schedule:
    - cron: '0 0 1 * *' # Run on the 1st of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Update Heartbeat Log
        run: |
          echo "Last Heartbeat: $(date)" > heartbeat.txt
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add heartbeat.txt
          git commit -m "chore: keep-alive heartbeat 💓 [skip ci]" || echo "No changes to commit"
          git push

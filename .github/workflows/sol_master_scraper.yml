name: SOL MBA Master Scraper

on:
  schedule:
    # Every 10 minutes: Fast Notice Scan
    - cron: '*/10 * * * *'
    # Every hour: Class Schedule & Deep Scan
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scraping Mode'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - website
          - notices

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Determine Mode
        id: determine_mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" == "*/10 * * * *" ]; then
            echo "mode=website" >> $GITHUB_OUTPUT
          else
            echo "mode=all" >> $GITHUB_OUTPUT
          fi

      - name: Run Scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPER_ANT_KEY: ${{ secrets.SCRAPER_ANT_KEY }}
          WEBSCRAPING_AI_KEY: ${{ secrets.WEBSCRAPING_AI_KEY }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: python scraper.py --mode ${{ steps.determine_mode.outputs.mode }}

      - name: Commit Sync Memory
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add synced_ids.json || true
          git commit -m "auto-update sync memory [skip ci]" || true
          git push || true

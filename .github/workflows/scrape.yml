name: Omni-Scraper Ninja Sync 🥷

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:      # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright playwright-stealth beautifulsoup4 curl_cffi python-dateutil
          playwright install chromium

      - name: Run Ninja Scraper 🚀
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          WEBSCRAPING_AI_KEY: ${{ secrets.WEBSCRAPING_AI_KEY }}
          SCRAPER_ANT_KEY: ${{ secrets.SCRAPER_ANT_KEY }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          # Note: GitHub IP rotation is native here! 
        run: python mba_scraper/scraper.py --mode all
